version: '3'
services:
  mongodb:
    image: mongo
    container_name: mongo
    restart: always
    ports:
      - 27017:27017
    networks:
      - backend
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - type: bind
        source: ./mongo_tab_data
        target: /data/db
      
  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - 8081:8081
    networks:
      - backend
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${ME_CONFIG_MONGODB_ADMINUSERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${ME_CONFIG_MONGODB_ADMINPASSWORD}
      ME_CONFIG_MONGODB_URL: mongodb://${ME_CONFIG_MONGODB_ADMINUSERNAME}:${ME_CONFIG_MONGODB_ADMINPASSWORD}@mongo:27017/
      ME_CONFIG_BASICAUTH: 0

  trigger-server:
    build:
      context: ./trigger_server
      dockerfile: Dockerfile
    container_name: trigger_server
    restart: always
    ports:
      - 3000:3000
    networks:
      - backend

  tab-scraper:
    image: tab_scraper
    container_name: tab_scraper
    restart: always
    networks:
      - backend
    depends_on:
      - mongodb
      - trigger-server
      
networks:
  backend:
